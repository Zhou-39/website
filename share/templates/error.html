<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>404 - 网站不存在</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .error-code {
            font-size: 3rem;
            font-weight: bold;
            color: #e53e3e;
            margin-bottom: 1rem;
        }
        .message {
            color: #666;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="message">
            {% if subdomain %}
                网站 <strong>{{ subdomain }}.share.free-hub.cn</strong> 不存在或已被禁用
            {% else %}
                {{ error }}
            {% endif %}
        </div>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
