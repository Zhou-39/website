<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Share Hub 登录</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 0.5rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 1rem;
        }
        button:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Share Hub 登录</h2>
        <p>使用 Free Hub 账户登录管理子域名</p>
        {% if error %}
        <div class="error">错误: {{ error }}</div>
        {% endif %}
        <button onclick="location.href='{{ login_url }}'">使用主站账户登录</button>
    </div>
</body>
</html>
